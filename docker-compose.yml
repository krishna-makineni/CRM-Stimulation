services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  crm-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/xeno-crm
      REDIS_URL: redis://redis:6379
      USE_INLINE_JOBS: 'false'
      CHANNEL_SERVICE_URL: http://channel-service:5001
      CRM_WEBHOOK_URL: http://crm-service:5000/api/webhooks/receipt
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NODE_ENV: development
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./crm-service:/app
      - /app/node_modules

  crm-worker:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev:worker"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/xeno-crm
      REDIS_URL: redis://redis:6379
      CHANNEL_SERVICE_URL: http://channel-service:5001
      CRM_WEBHOOK_URL: http://crm-service:5000/api/webhooks/receipt
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NODE_ENV: development
    depends_on:
      - mongodb
      - redis
      - crm-service
    volumes:
      - ./crm-service:/app
      - /app/node_modules

  channel-service:
    image: node:20-alpine
    working_dir: /app/channel-service
    command: sh -c "npm install && npm run dev"
    ports:
      - '5001:5001'
    environment:
      PORT: 5001
      REDIS_URL: redis://redis:6379
      USE_INLINE_JOBS: 'false'
      CRM_WEBHOOK_URL: http://crm-service:5000/api/webhooks/receipt
      NODE_ENV: development
    depends_on:
      - redis
      - crm-service
    volumes:
      - ./channel-service:/app/channel-service
      - ./shared:/app/shared
      - /app/channel-service/node_modules

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - ./shared:/shared
      - /app/node_modules
    depends_on:
      - crm-service

volumes:
  mongodb_data:
